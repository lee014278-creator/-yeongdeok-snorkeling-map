<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영덕 스노클링 포인트 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  .wrap { height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #f4f5f7; }

  .map-box { flex: 0 0 760px; position: relative; }
  #map { width: 100%; height: 100%; background: #aadaff; }

  .filters {
    flex: 0 0 auto;
    display: flex; gap: 7px; padding: 11px 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    background: #fff; border-bottom: 1px solid #e6e8eb;
  }
  .filters::-webkit-scrollbar { display: none; }
  .fbtn {
    flex: 0 0 auto;
    min-height: 38px; padding: 8px 16px;
    border: 1.5px solid #1f3a5f; border-radius: 999px;
    background: #fff; color: #1f3a5f;
    font-size: 14px; font-weight: 700; white-space: nowrap;
    cursor: pointer; transition: .15s;
  }
  .fbtn.on { background: #1f3a5f; color: #fff; }

  .cards {
    flex: 1; min-height: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 12px 12px 28px;
  }
  .card {
    background: #fff; border: 1px solid #e6e8eb; border-radius: 14px;
    padding: 15px 16px 16px; margin-bottom: 11px;
    cursor: pointer; transition: .15s;
  }
  .card.on { border-color: #1f3a5f; box-shadow: 0 3px 14px rgba(31,58,95,.16); }
  .card-head { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
  .card-num {
    flex: 0 0 auto;
    width: 25px; height: 25px; border-radius: 50%;
    background: #1f3a5f; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .card-name { font-size: 16.5px; font-weight: 800; color: #16202e; }
  .card-desc { font-size: 13.5px; line-height: 1.6; color: #4a5360; margin-bottom: 12px; }
  .card-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .btn {
    min-height: 44px; padding: 10px 16px; border-radius: 999px;
    font-size: 14.5px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    text-decoration: none; color: #fff; background: #1f3a5f;
  }

  .tip-num {
    width: 21px; height: 21px; border-radius: 50%;
    background: #1f3a5f; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    text-shadow: none !important; box-shadow: 0 1px 3px rgba(0,0,0,.3);
    border: 1.5px solid #fff;
  }
  .leaflet-tooltip .tip-num { text-shadow: none !important; font-weight: 500 !important; }

  .leaflet-tooltip.place-tip {
    background: transparent; border: 0; box-shadow: none; padding: 0;
    font-size: 13px; font-weight: 700; color: #16202e;
    white-space: nowrap;
    text-shadow:
      -1.2px -1.2px 0 #fff, 1.2px -1.2px 0 #fff,
      -1.2px 1.2px 0 #fff, 1.2px 1.2px 0 #fff,
      0 0 3px #fff;
  }
  .leaflet-tooltip.place-tip::before { display: none; }

  .marker-wrap { display: flex; align-items: center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="map-box"><div id="map"></div></div>
  <div class="filters" id="filters"></div>
  <div class="cards" id="cards"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 남 -> 북 위도순. 번호=거리순.
// lat/lng = 실제 좌표 (네이버 지도 버튼은 장소명 검색이라 정확)
// 지도 마커는 실제 좌표로 표시. 지도 범위를 장소 양 끝에 맞춰 확대해 세로로 펼침.
// 실제로 바로 붙은 일부 지점만 dlat로 살짝 분리(라벨 겹침 방지).
const rawSpots = [
  { name:"구계항 방파제",          lat:36.3661, lng:129.4179, region:"yeongdeok",
    desc:"강구항에서 가까운 남쪽 포인트. 방파제 안쪽이 비교적 잔잔해 가볍게 들르기 좋습니다." },
  { name:"오보해수욕장",            lat:36.4286, lng:129.4316, region:"yeongdeok",
    desc:"모래와 바위가 섞인 해변. 입수 지점이 완만해 초보자도 부담이 덜합니다." },
  { name:"창포리 숨은 스팟",        lat:36.4423, lng:129.4380, region:"yeongdeok",
    desc:"창포리 해안의 작은 포인트. 사람이 적어 조용히 물놀이하기 좋은 자리입니다." },
  { name:"대탄해변",               lat:36.4512, lng:129.4408, region:"yeongdeok",
    dlat:36.4495, desc:"맑은 물색이 좋은 해변. 바위 주변으로 작은 어류가 잘 보입니다." },
  { name:"대탄방파제",             lat:36.4528, lng:129.4421, region:"yeongdeok",
    dlat:36.4555, desc:"대탄해변 옆 방파제. 안쪽 수면이 잔잔해 입수와 휴식이 편합니다." },
  { name:"대부방파제",             lat:36.4602, lng:129.4456, region:"yeongdeok",
    desc:"영덕대게로 변에 있어 접근이 쉬운 포인트. 방파제 안쪽이 안정적입니다." },
  { name:"국립청소년해양센터",       lat:36.4748, lng:129.4521, region:"yeongdeok",
    desc:"해양 체험 시설이 있는 곳. 주변 바닷가에서 물놀이를 곁들이기 좋습니다." },
  { name:"석동방파제",             lat:36.4983, lng:129.4503, region:"chuksan", dir:"left",
    desc:"축산면 석리의 방파제. 바위 지대가 이어져 스노클링 시야가 좋은 편입니다." },
  { name:"경정해변",              lat:36.5040, lng:129.4571, region:"chuksan",
    dlat:36.5010, desc:"물이 맑기로 알려진 해변. 자갈과 바위 사이로 물속이 잘 보입니다." },
  { name:"경정리 105 소방파제",     lat:36.5053, lng:129.4585, region:"chuksan",
    dlat:36.5065, desc:"경정해변 인근 소방파제. 안쪽이 잔잔해 가볍게 입수하기 좋습니다." },
  { name:"바다마루민박 앞 포인트",   lat:36.5071, lng:129.4593, region:"chuksan",
    dlat:36.5125, desc:"민박 바로 앞 포인트. 숙소에서 곧바로 물에 들어갈 수 있는 자리입니다." },
  { name:"축산항",                lat:36.5118, lng:129.4528, region:"chuksan",
    dlat:36.5185, desc:"축산면의 거점 항구. 주변에 편의시설이 있어 베이스로 삼기 좋습니다." },
  { name:"덕신민박 앞 소방파제",     lat:36.5402, lng:129.4495, region:"yeonghae",
    desc:"민박 앞 작은 방파제. 한적하고 안쪽 수면이 안정적입니다." },
  { name:"대진스쿠버 앞",          lat:36.5471, lng:129.4488, region:"yeonghae",
    desc:"다이빙 숍 앞 포인트. 장비 대여와 입수가 한 자리에서 가능합니다." },
  { name:"영해면 사진리 숨은 포인트", lat:36.5558, lng:129.4467, region:"yeonghae",
    desc:"사진리 끝자락의 조용한 포인트. 사람이 거의 없어 호젓하게 즐길 수 있습니다." },
];
// 거리순(남->북)으로 정렬 후 번호 1~15 재배정
const spots = [...rawSpots].sort((a,b)=>a.lat-b.lat).map((s,i)=>({ ...s, n:i+1 }));

const map = L.map('map', {
  zoomControl: false, attributionControl: false,
  dragging:false, scrollWheelZoom:false, doubleClickZoom:false,
  touchZoom:false, boxZoom:false, keyboard:false
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
map.dragging.disable(); map.scrollWheelZoom.disable(); map.doubleClickZoom.disable();
map.touchZoom.disable(); map.boxZoom.disable(); map.keyboard.disable();

const filters = [
  { key:"all",       label:"전체" },
  { key:"yeongdeok", label:"영덕읍권" },
  { key:"chuksan",   label:"축산권" },
  { key:"yeonghae",  label:"영해권" },
];

let markers = {};
let current = "all";

function tipDir(dir){
  if(dir==="left")  return { direction:"left",  offset:[-13,0] };
  if(dir==="right") return { direction:"right", offset:[13,0] };
  if(dir==="top")   return { direction:"top",   offset:[0,-13] };
  return { direction:"bottom", offset:[0,13] };
}
function dlat(s){ return s.dlat != null ? s.dlat : s.lat; }
function dlng(s){ return s.dlng != null ? s.dlng : s.lng; }

function drawMarkers(list){
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const lngsAll = list.map(s=>dlng(s));
  const cLngRef = (Math.min(...lngsAll) + Math.max(...lngsAll)) / 2;
  list.forEach(s => {
    const icon = L.divIcon({
      className:"", html:`<div class="marker-wrap"><div class="tip-num">${s.n}</div></div>`,
      iconSize:[21,21], iconAnchor:[10,10]
    });
    const mk = L.marker([dlat(s), dlng(s)], { icon }).addTo(map);
    const d = tipDir(s.dir ? s.dir : (dlng(s) >= cLngRef ? "right" : "left"));
    mk.bindTooltip(s.name, {
      permanent:true, className:"place-tip",
      direction:d.direction, offset:d.offset, opacity:1
    });
    mk.on('click', () => selectCard(s.n));
    markers[s.n] = mk;
  });
  const lats = list.map(s=>dlat(s)), lngs = list.map(s=>dlng(s));
  const bounds = [[Math.min(...lats), Math.min(...lngs)], [Math.max(...lats), Math.max(...lngs)]];
  map.fitBounds(bounds, { paddingTopLeft:[80,12], paddingBottomRight:[80,12], maxZoom:16 });
}

function render(){
  const list = current==="all" ? spots : spots.filter(s=>s.region===current);
  drawMarkers(list);
  const cards = document.getElementById('cards');
  cards.innerHTML = "";
  list.forEach(s => {
    const nq = encodeURIComponent(s.name);
    const card = document.createElement('div');
    card.className = "card"; card.id = "card-"+s.n;
    card.innerHTML = `
      <div class="card-head">
        <div class="card-num">${s.n}</div>
        <div class="card-name">${s.name}</div>
      </div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-btns">
        <a class="btn" href="https://map.naver.com/p/search/${nq}" target="_blank" rel="noopener">네이버 지도</a>
      </div>`;
    card.addEventListener('click', e => { if(e.target.tagName!=="A") selectCard(s.n); });
    cards.appendChild(card);
  });
}

function selectCard(n){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const card = document.getElementById('card-'+n);
  if(card){ card.classList.add('on'); document.getElementById('cards').prepend(card); document.getElementById('cards').scrollTop = 0; }
  Object.values(markers).forEach(m=>{ if(m._icon){ const b=m._icon.querySelector('.tip-num'); if(b) b.style.background="#1f3a5f"; }});
  if(markers[n] && markers[n]._icon){ const b=markers[n]._icon.querySelector('.tip-num'); if(b) b.style.background="#c0392b"; }
}

function buildFilters(){
  const box = document.getElementById('filters');
  filters.forEach(f => {
    const b = document.createElement('button');
    b.className = "fbtn" + (f.key==="all"?" on":"");
    b.textContent = f.label;
    b.addEventListener('click', () => {
      current = f.key;
      document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      render();
      document.getElementById('cards').scrollTop = 0;
    });
    box.appendChild(b);
  });
}

buildFilters();
render();
</script>
</body>
</html>
