<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영덕 스노클링 포인트 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  .wrap { height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #f4f5f7; }

  /* 지도만 꽉 채움 (아래 카드 목록 없음) */
  .map-box { flex: 1; position: relative; min-height: 0; }
  #map { width: 100%; height: 100%; background: #aadaff; }

  /* 지도 위 안내 띠 */
  .map-hint {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 600;
    background: rgba(31,58,95,.92); color: #fff;
    font-size: 13px; font-weight: 700;
    padding: 8px 15px; border-radius: 999px;
    white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,.2);
    pointer-events: none;
  }

  /* 필터 */
  .filters {
    position: absolute; left: 8px; right: 8px; bottom: 10px; z-index: 600;
    display: flex; gap: 7px; justify-content: center;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .fbtn {
    flex: 0 0 auto;
    min-height: 38px; padding: 8px 15px;
    border: 0; border-radius: 999px;
    background: #fff; color: #1f3a5f;
    font-size: 13.5px; font-weight: 700; white-space: nowrap;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  .fbtn.on { background: #1f3a5f; color: #fff; }

  /* 번호 배지 */
  .tip-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: #1f3a5f; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
    text-shadow: none !important; box-shadow: 0 1px 4px rgba(0,0,0,.35);
    border: 2px solid #fff; cursor: pointer;
  }
  .tip-num.on { background: #c0392b; transform: scale(1.15); }

  /* 평소 표시되는 번호+장소명 라벨 (지그재그) */
  .leaflet-tooltip.place-tip {
    background: transparent; border: 0; box-shadow: none; padding: 0;
    font-size: 13px; font-weight: 800; color: #fff;
    white-space: nowrap;
    text-shadow:
      -1.4px -1.4px 0 #1f3a5f, 1.4px -1.4px 0 #1f3a5f,
      -1.4px 1.4px 0 #1f3a5f, 1.4px 1.4px 0 #1f3a5f,
      0 0 4px rgba(0,0,0,.5);
  }
  .leaflet-tooltip.place-tip::before { display: none; }

  /* 마커: 번호 기준점, 장소명은 왼쪽(지도쪽) / 버튼은 오른쪽 */
  .marker-wrap { position: relative; width: 26px; height: 26px; }
  .tip-num { position: absolute; left: 0; top: 0; }

  /* 장소명: 번호 왼쪽. 진한 글자 + 흰 외곽선 */
  .m-name {
    position: absolute; right: 32px; top: 50%; transform: translateY(-50%);
    font-size: 13.5px; font-weight: 800; color: #14233a; white-space: nowrap;
    text-shadow:
      -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff,
      -1.5px 1.5px 0 #fff, 1.5px 1.5px 0 #fff, 0 0 3px #fff;
    pointer-events: none;
  }

  /* 버튼: 평소 숨김. 클릭 시 번호 오른쪽에 화살표로 번호를 가리키며 등장 */
  .side-btn, .side-btn:link, .side-btn:visited, .side-btn:hover, .side-btn:active {
    color: #ffffff !important;
  }
  .side-btn {
    display: none; position: absolute; left: 35px; top: 50%;
    transform: translateY(-50%);
    min-height: 34px; padding: 8px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 800; white-space: nowrap;
    align-items: center; justify-content: center;
    text-decoration: none; background: #15294a;
    box-shadow: 0 2px 10px rgba(0,0,0,.35);
  }
  .side-btn::before {
    content: ""; position: absolute; left: -7px; top: 50%;
    transform: translateY(-50%);
    border-top: 7px solid transparent; border-bottom: 7px solid transparent;
    border-right: 8px solid #15294a;
  }
  .marker-wrap.open .side-btn { display: inline-flex; }
  .marker-wrap.open { z-index: 1000 !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="map-box">
    <div id="map"></div>
    <div class="map-hint">📍 번호를 누르면 네이버 지도 링크가 나와요</div>
    <div class="filters" id="filters"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 글 목록을 거리순(남->북)으로 정렬해 번호 1~15 재배정.
// 경도는 실제 영덕 해안선(약 129.37~129.45)에 맞춰 보정. 이전 값이 동쪽(바다)으로 치우쳐 있었음.
const rawSpots = [
  { name:"구계항 방파제",          lat:36.3661, lng:129.3960, region:"yeongdeok" },
  { name:"오보해수욕장",            lat:36.4286, lng:129.4090, region:"yeongdeok" },
  { name:"창포리 숨은 스팟",        lat:36.4423, lng:129.4140, region:"yeongdeok" },
  { name:"대탄해변",               lat:36.4512, lng:129.4165, region:"yeongdeok" },
  { name:"대탄방파제",             lat:36.4528, lng:129.4178, region:"yeongdeok" },
  { name:"대부방파제",             lat:36.4602, lng:129.4205, region:"yeongdeok" },
  { name:"국립청소년해양센터",       lat:36.4748, lng:129.4255, region:"yeongdeok" },
  { name:"석동방파제",             lat:36.4983, lng:129.4360, region:"chuksan" },
  { name:"경정해변",              lat:36.5040, lng:129.4420, region:"chuksan" },
  { name:"경정리 105 소방파제",     lat:36.5053, lng:129.4432, region:"chuksan" },
  { name:"바다마루민박 앞 포인트",   lat:36.5071, lng:129.4440, region:"chuksan" },
  { name:"축산항",                lat:36.5118, lng:129.4470, region:"chuksan" },
  { name:"덕신민박 앞 소방파제",     lat:36.5402, lng:129.4380, region:"yeonghae" },
  { name:"대진스쿠버 앞",          lat:36.5471, lng:129.4375, region:"yeonghae" },
  { name:"영해면 사진리 숨은 포인트", lat:36.5558, lng:129.4360, region:"yeonghae" },
];
const spots = [...rawSpots].sort((a,b)=>a.lat-b.lat).map((s,i)=>({ ...s, n:i+1 }));

const map = L.map('map', {
  zoomControl: false, attributionControl: false,
  dragging:false, scrollWheelZoom:false, doubleClickZoom:false,
  touchZoom:false, boxZoom:false, keyboard:false
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
map.dragging.disable(); map.scrollWheelZoom.disable(); map.doubleClickZoom.disable();
map.touchZoom.disable(); map.boxZoom.disable(); map.keyboard.disable();

const filters = [
  { key:"all", label:"전체" },
  { key:"yeongdeok", label:"영덕읍권" },
  { key:"chuksan", label:"축산권" },
  { key:"yeonghae", label:"영해권" },
];

let markers = {};
let current = "all";

function buildMarkers(list){
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  // 지도 범위: 해안선(장소들 경도)이 화면 가로 중앙에 오게. 바다 반 / 육지 반 보이게.
  const lats = list.map(s=>s.lat), lngs = list.map(s=>s.lng);
  const minLat=Math.min(...lats), maxLat=Math.max(...lats);
  const cLng=(Math.min(...lngs)+Math.max(...lngs))/2;
  const halfLng=0.02;
  map.fitBounds([[minLat, cLng-halfLng],[maxLat, cLng+halfLng]],
    { paddingTopLeft:[20,24], paddingBottomRight:[20,120], maxZoom:14 });

  const W = map.getSize().x;

  // 픽셀 변환 후 번호를 한 세로줄(화면 중앙)로 정렬, 장소명은 왼쪽으로.
  const sorted = [...list].sort((a,b)=>a.lat-b.lat);
  const pts = sorted.map(s => {
    const p = map.latLngToContainerPoint([s.lat, s.lng]);
    return { s, x:p.x, y:p.y };
  });
  pts.sort((a,b)=>a.y-b.y);
  const MINY = 32;
  for (let i=1; i<pts.length; i++){
    if (pts[i].y - pts[i-1].y < MINY) pts[i].y = pts[i-1].y + MINY;
  }
  // 번호는 실제 좌표(해안선 모양)대로. 좌우 위치 그대로 두어 해안선을 따라 구불구불 배치.
  // (일렬 고정 안 함)

  const mapW = map.getSize().x;
  pts.forEach((pt, idx) => {
    const s = pt.s;
    const ll = map.containerPointToLatLng([pt.x, pt.y]);
    const nq = encodeURIComponent(s.name);

    // [장소명(왼쪽)] [번호] [버튼(숨김)] - 번호는 중앙 한 줄, 장소명은 왼쪽으로 펼침
    const inner =
      `<span class="m-name">${s.name}</span>`+
      `<div class="tip-num" data-n="${s.n}">${s.n}</div>`+
      `<a class="side-btn" href="https://map.naver.com/p/search/${nq}" target="_blank" rel="noopener">네이버 지도</a>`;
    const icon = L.divIcon({
      className:"", html:`<div class="marker-wrap" data-mn="${s.n}">${inner}</div>`,
      iconSize:[26,26], iconAnchor:[13,13]
    });
    const mk = L.marker(ll, { icon }).addTo(map);
    mk.on('click', () => selectSpot(s.n));
    markers[s.n] = mk;
  });
}

map.on('click', () => {
  document.querySelectorAll('.marker-wrap').forEach(w=>w.classList.remove('open'));
  document.querySelectorAll('.tip-num').forEach(el=>el.classList.remove('on'));
});

function selectSpot(n){
  document.querySelectorAll('.marker-wrap').forEach(w=>w.classList.remove('open'));
  document.querySelectorAll('.tip-num').forEach(el=>el.classList.remove('on'));
  const wrap = document.querySelector(`.marker-wrap[data-mn="${n}"]`);
  if(wrap){
    wrap.classList.add('open');
    const b = wrap.querySelector('.tip-num'); if(b) b.classList.add('on');
  }
}

function render(){
  const list = current==="all" ? spots : spots.filter(s=>s.region===current);
  buildMarkers(list);
}

function buildFilters(){
  const box = document.getElementById('filters');
  filters.forEach(f => {
    const b = document.createElement('button');
    b.className = "fbtn" + (f.key==="all"?" on":"");
    b.textContent = f.label;
    b.addEventListener('click', () => {
      current = f.key;
      document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      render();
    });
    box.appendChild(b);
  });
}

buildFilters();
render();
</script>
</body>
</html>
